<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <div class="topbar">
      <span class="app-title">🎵 Music Player</span>
      <button id="listToggle" class="icon-btn" title="Show all tracks">📋 Tracks</button>
    </div>

    <div class="main-area">
      <div class="art-panel">
        <img src="images/cover.jpg" class="cover-large" id="cover" alt="Album cover">
        <div class="now-playing-info">
          <span class="now-playing-label">Now Playing</span>
          <h2 id="title">Song Title</h2>
          <p id="artist">Artist Name</p>
        </div>
      </div>

      <aside class="track-list-panel hidden" id="trackListPanel">
        <input type="text" id="trackSearch" placeholder="Search tracks...">
        <ul id="trackList"></ul>
      </aside>
    </div>

    <div class="bottom-bar">
      <div class="seek-row">
        <span id="currentTime">0:00</span>
        <input type="range" id="progress" value="0">
        <span id="duration">0:00</span>
      </div>

      <div class="controls-row">
        <div class="controls-side">
          <button id="shuffle" class="toggle-btn" title="Shuffle">🔀 Shuffle</button>
          <button id="repeat" class="toggle-btn" title="Repeat">🔁 Repeat: Off</button>
        </div>

        <div class="controls-center">
          <button id="prev" title="Previous track">⏮</button>
          <button id="seekBack" title="Back 10 seconds">⏪10</button>
          <button id="play" title="Play/Pause">▶</button>
          <button id="seekForward" title="Forward 10 seconds">10⏩</button>
          <button id="next" title="Next track">⏭</button>
        </div>

        <div class="controls-side volume">
          <i class="vol-icon">🔊</i>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
        </div>
      </div>
    </div>

  </div>

  <audio id="audio"></audio>
  <script src="script.js"></script>
</body>
</html>
