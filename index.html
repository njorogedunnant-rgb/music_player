<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player">
    <img src="images/cover.jpg" class="cover" id="cover" alt="Album cover">
    <h2>Now Playing</h2>
    <h3 id="title">Song Title</h3>
    <p id="artist">Artist Name</p>

    <audio id="audio"></audio>

    <div class="progress-wrap">
      <span id="currentTime">0:00</span>
      <input type="range" id="progress" value="0">
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button id="prev" title="Previous track">⏮</button>
      <button id="seekBack" title="Back 10 seconds">⏪ 10</button>
      <button id="play" title="Play/Pause">▶</button>
      <button id="seekForward" title="Forward 10 seconds">10 ⏩</button>
      <button id="next" title="Next track">⏭</button>
    </div>

    <div class="secondary-controls">
      <button id="shuffle" class="toggle-btn" title="Shuffle">🔀</button>
      <button id="repeat" class="toggle-btn" title="Repeat">🔁</button>
      <button id="listToggle" class="toggle-btn" title="Show all tracks">📋 Tracks</button>
    </div>

    <div class="volume">
      <i class="vol-icon">🔊</i>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
    </div>

    <div class="track-list-panel hidden" id="trackListPanel">
      <input type="text" id="trackSearch" placeholder="Search tracks...">
      <ul id="trackList"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
